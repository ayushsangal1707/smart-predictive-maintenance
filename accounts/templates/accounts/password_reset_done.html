{% extends "base.html" %}
{% block title %}Reset Link Sent{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card text-center">
        <h2>Check Your Email</h2>
        <p>
            If an account exists with that email address, we've sent instructions
            for resetting the password. It may take a few minutes to arrive.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary">Back to Login</a>
    </div>
</div>
{% endblock %}
